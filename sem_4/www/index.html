<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karty z efektami hover i modalem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="row g-4">
        <!-- Pierwsza karta - tylko zmiana tła -->
        <div class="col-md-3">
            <div class="card p-3 fade-in effect-bg">
                <h5 class="card-title">Karta 1</h5>
                <p class="card-text">Efekt zmiany koloru tła.</p>
            </div>
        </div>

        <!-- Druga karta - tylko zmiana cienia -->
        <div class="col-md-3">
            <div class="card p-3 fade-in effect-shadow">
                <h5 class="card-title">Karta 2</h5>
                <p class="card-text">Efekt zmiany cienia.</p>
            </div>
        </div>

        <!-- Trzecia karta - zmiana cienia i powiększenie -->
        <div class="col-md-3">
            <div class="card p-3 fade-in effect-shadow-scale">
                <h5 class="card-title">Karta 3</h5>
                <p class="card-text">Efekt zmiany cienia i powiększenia.</p>
            </div>
        </div>

        <!-- Czwarta karta - wszystkie efekty + modal -->
        <div class="col-md-3">
            <div class="card p-3 fade-in effect-all">
                <h5 class="card-title">Karta 4</h5>
                <p class="card-text">Wszystkie efekty + modal.</p>
                <button class="btn btn-primary mt-2" data-bs-toggle="modal" data-bs-target="#infoModal">Więcej informacji</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="infoModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalLabel">Dodatkowe informacje</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Tutaj możesz umieścić więcej szczegółowych informacji lub treści, które chcesz wyświetlić użytkownikowi.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Zamknij</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
